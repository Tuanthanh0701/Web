<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Web Âm Nhạc - Tailwind Ngăn Nắp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="
    min-h-screen 
    flex items-center justify-center 
    p-4 
    bg-slate-950 text-white 
    antialiased
">

    <!-- Container chính -->
    <div class="
        w-full max-w-5xl 
        grid grid-cols-1 md:grid-cols-3 
        bg-slate-900 
        border border-slate-800 rounded-3xl 
        overflow-hidden shadow-2xl
    ">
        
        <!-- BÊN TRÁI: DANH SÁCH BÀI HÁT -->
        <div class="
            md:col-span-2 
            p-6 
            border-b md:border-b-0 md:border-r border-slate-800
        ">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-tight">Xu Hướng Tuần Này</h2>
                <a href="#" class="text-xs text-emerald-400 hover:underline">Xem tất cả</a>
            </div>

            <!-- List bài hát -->
            <div class="space-y-2">
                <!-- Bài 1 (Đang phát) -->
                <div class="
                    flex items-center justify-between 
                    p-3 
                    bg-slate-800/60 border border-slate-700/50 rounded-xl 
                    cursor-pointer group
                ">
                    <div class="flex items-center gap-4">
                        <span class="w-4 text-center font-bold text-emerald-400">1</span>
                        <img class="w-12 h-12 rounded-lg object-cover" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=150" alt="Cover">
                        <div>
                            <h4 class="font-semibold text-emerald-400 group-hover:text-white transition-colors">Để Tôi Chiều Em</h4>
                            <p class="text-xs text-slate-400">Nguyễn Thạc Bảo Ngọc</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xs text-slate-400">03:45</span>
                        <button class="text-emerald-400"><i class="fas fa-volume-high"></i></button>
                    </div>
                </div>

                <!-- Bài 2 -->
                <div class="
                    flex items-center justify-between 
                    p-3 
                    hover:bg-slate-800/40 rounded-xl 
                    cursor-pointer transition group
                ">
                    <div class="flex items-center gap-4">
                        <span class="w-4 text-center font-bold text-slate-500">2</span>
                        <img class="w-12 h-12 rounded-lg object-cover" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=150" alt="Cover">
                        <div>
                            <h4 class="font-semibold text-slate-200 group-hover:text-emerald-400 transition-colors">Bật Tình Yêu Lên</h4>
                            <p class="text-xs text-slate-400">Tăng Duy Tân x Hòa Minzy</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xs text-slate-400">02:30</span>
                        <button class="text-slate-400 hover:text-white opacity-0 group-hover:opacity-100 transition"><i class="fas fa-play"></i></button>
                    </div>
                </div>

                <!-- Bài 3 -->
                <div class="
                    flex items-center justify-between 
                    p-3 
                    hover:bg-slate-800/40 rounded-xl 
                    cursor-pointer transition group
                ">
                    <div class="flex items-center gap-4">
                        <span class="w-4 text-center font-bold text-slate-500">3</span>
                        <img class="w-12 h-12 rounded-lg object-cover" src="https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=150" alt="Cover">
                        <div>
                            <h4 class="font-semibold text-slate-200 group-hover:text-emerald-400 transition-colors">Nấu Ăn Cho Em</h4>
                            <p class="text-xs text-slate-400">Đen Vâu ft. PiaLinh</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xs text-slate-400">04:12</span>
                        <button class="text-slate-400 hover:text-white opacity-0 group-hover:opacity-100 transition"><i class="fas fa-play"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BÊN PHẢI: TRÌNH PHÁT NHẠC MINI -->
        <div class="
            flex flex-col justify-between 
            p-6 
            bg-slate-900/40
        ">
            <!-- Đĩa nhạc -->
            <div class="text-center mt-4">
                <div class="relative w-40 h-40 mx-auto mb-6">
                    <img class="
                        w-full h-full 
                        object-cover rounded-full 
                        border-4 border-slate-700 shadow-2xl 
                        animate-[spin_20s_linear_infinite]
                    " src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400" alt="Current Album">
                    
                    <!-- Lỗ kim đĩa nhạc -->
                    <div class="
                        absolute inset-0 m-auto 
                        w-8 h-8 
                        bg-slate-900 
                        border-4 border-slate-700 rounded-full
                    "></div>
                </div>
                
                <h3 class="text-xl font-bold truncate">Để Tôi Chiều Em</h3>
                <p class="text-sm text-slate-400 mt-1">Nguyễn Thạc Bảo Ngọc</p>
            </div>

            <!-- Thanh Progress -->
            <div class="mt-6">
                <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden cursor-pointer">
                    <div class="w-2/5 h-full bg-emerald-500 rounded-full"></div>
                </div>
                <div class="flex justify-between text-[10px] text-slate-400 mt-2">
                    <span>01:25</span>
                    <span>03:45</span>
                </div>
            </div>

            <!-- Bộ nút điều khiển -->
            <div class="flex items-center justify-center gap-6 my-6 text-slate-400">
                <button class="text-sm hover:text-white transition"><i class="fas fa-shuffle"></i></button>
                <button class="text-lg hover:text-white transition"><i class="fas fa-backward-step"></i></button>
                
                <!-- Nút Play/Pause chính -->
                <button class="
                    w-12 h-12 
                    flex items-center justify-center 
                    bg-emerald-500 hover:bg-emerald-400 text-slate-950 
                    rounded-full text-lg shadow-lg shadow-emerald-500/20
                    transform transition 
                    hover:scale-105 active:scale-95 
                ">
                    <i class="fas fa-pause"></i>
                </button>
                
                <button class="text-lg hover:text-white transition"><i class="fas fa-forward-step"></i></button>
                <button class="text-sm text-emerald-400 transition"><i class="fas fa-repeat"></i></button>
            </div>
        </div>

    </div>

</body>
</html>
